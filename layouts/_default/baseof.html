<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ block "title" . }}{{ end }} / {{ .Site.Title }}</title>

    <script>
      (function() {
        const cachedTheme = localStorage.getItem("color-scheme");
        const theme = cachedTheme || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("color-scheme", theme);
      })();
    </script>

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:site_name" content="Luc Wallace" />
    <meta name="theme-color" content="#D84744" />
    <meta property="og:image" content="/images/android-chrome-512x512.png" />

    {{ block "header" .}} {{ end }}
    <!-- 
    <link
      href="https://fonts.cdnfonts.com/css/pp-neue-montreal"
      rel="stylesheet"
    /> -->

    <link
      rel="preload"
      href="/fonts/ppneuemontreal-bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="/fonts/ppneuemontreal-medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/ppneuemontreal-italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    {{ $mainStyle := resources.Get "css/main.css" | minify | fingerprint }}
    <link
      rel="stylesheet"
      href="{{ $mainStyle.RelPermalink }}"
      integrity="{{ $mainStyle.Data.Integrity }}"
    />

    {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
    <script
      src="{{ $js.RelPermalink }}"
      integrity="{{ $js.Data.Integrity }}"
      defer
    ></script>
  </head>
  <body>
    <main>{{ block "main" . }}{{ end }}</main>
  </body>
</html>
